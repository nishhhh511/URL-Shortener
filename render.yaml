services:
  - type: web
    name: linkpilot-api
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm ci && npx prisma generate
    startCommand: npx prisma migrate deploy && npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
